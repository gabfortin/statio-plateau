<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stationnement Hors Rue — Plateau-Mont-Royal</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="icon" type="image/svg+xml" href="img/icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="header-brand">
        <img src="img/icon.svg" class="app-icon" alt="" />
        <div>
          <h1>Stationnement Plateau</h1>
          <p class="subtitle">Montréal · Hors rue uniquement</p>
        </div>
      </div>
      <div class="header-actions">
        <a href="https://gabfortin.com" target="_blank" rel="noopener" class="author-link">
          <img src="img/Gabriel%20Fortin.png" alt="Gabriel Fortin" class="author-avatar" />
          <span class="author-name">gabfortin.com</span>
        </a>
        <button id="geo-btn" title="Trier par distance">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          </svg>
        </button>
        <span id="count-badge">—</span>
      </div>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="tous">Tous</button>
      <button class="filter-btn" data-filter="gratuit">Gratuit</button>
      <button class="filter-btn" data-filter="mixte">Mixte</button>
      <button class="filter-btn" data-filter="payant">Payant</button>
      <button class="filter-btn" data-filter="inconnu">?</button>
    </div>
  </header>

  <div id="map">
    <div id="loading">
      <div class="spinner"></div>
      <p>Chargement des données OSM…</p>
    </div>
  </div>

  <button class="list-toggle" id="list-toggle" title="Afficher/masquer la liste">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
    <span id="list-toggle-label">Liste</span>
  </button>

  <main>
    <div id="parking-list"></div>
    <p class="disclaimer">Données <a href="https://www.openstreetmap.org" target="_blank">OpenStreetMap</a> · Qualité variable, à valider sur le terrain</p>
  </main>

  <div class="dev-banner">🚧 Application en développement</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
